<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bluelight Academy – Message Graphics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height:100vh;
  background:#0f172a;
  display:flex; flex-direction:column; align-items:center;
  padding:30px 20px 60px;
  font-family:'Segoe UI',Arial,sans-serif;
}

/* ── TOOLBAR ── */
.toolbar {
  width:100%; max-width:720px;
  background:#1e293b; border:1px solid #334155;
  border-radius:14px; padding:16px 20px;
  margin-bottom:26px;
  display:flex; flex-wrap:wrap; gap:14px; align-items:center;
}
.toolbar label { color:#94a3b8; font-size:11px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; }
.toolbar-group { display:flex; flex-direction:column; gap:5px; }
.toolbar input[type="color"] { width:38px; height:30px; border:none; border-radius:6px; cursor:pointer; background:none; padding:0; }
.toolbar input[type="range"] { width:100px; accent-color:#3b82f6; }
.toolbar select, .toolbar input[type="text"] {
  background:#0f172a; border:1px solid #334155; color:#e2e8f0;
  border-radius:7px; padding:5px 10px; font-size:13px; outline:none;
}
.toolbar select:focus, .toolbar input[type="text"]:focus { border-color:#3b82f6; }
.btn-download {
  margin-left:auto;
  background:linear-gradient(135deg,#f59e0b,#d97706);
  color:#fff; border:none; border-radius:10px;
  padding:10px 26px; font-size:14px; font-weight:700;
  cursor:pointer; letter-spacing:.4px;
  box-shadow:0 4px 14px rgba(245,158,11,.35);
  transition:transform .15s, box-shadow .15s;
}
.btn-download:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(245,158,11,.5); }

/* ── CARD ── */
#card {
  width:720px;
  background:#fff;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 30px 70px rgba(0,0,0,.55);
}

/* ── HEADER ── */
.card-header {
  background:linear-gradient(135deg, #1e40af 0%, #2563eb 35%, #3b82f6 65%, #60a5fa 100%);
  position:relative; overflow:hidden; padding:0;
}
.hdr-orb1 {
  position:absolute; width:300px; height:300px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,.18) 0%, transparent 70%);
  top:-80px; left:-60px; pointer-events:none;
}
.hdr-orb2 {
  position:absolute; width:200px; height:200px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,.12) 0%, transparent 70%);
  bottom:-60px; right:80px; pointer-events:none;
}
.hdr-dots {
  position:absolute; inset:0; pointer-events:none; opacity:.07;
  background-image:radial-gradient(circle, #fff 1px, transparent 1px);
  background-size:22px 22px;
}
.hdr-inner {
  position:relative; z-index:2;
  display:flex; align-items:center;
  padding:26px 32px 22px; gap:22px;
}
.hdr-logo-wrap { flex-shrink:0; }
.hdr-logo-ring {
  width:86px; height:86px; border-radius:50%;
  overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.hdr-logo-ring img { width:100%; height:100%; object-fit:contain; }
.hdr-brand { flex:1; }
.hdr-school-name {
  font-size:26px; font-weight:900; color:#fff;
  letter-spacing:.4px; line-height:1.1;
  text-shadow:0 2px 10px rgba(0,0,0,.25);
}
.hdr-school-name em { font-style:normal; color:#fde68a; }
.hdr-divider-line {
  width:48px; height:3px; border-radius:2px;
  background:linear-gradient(90deg,#fde68a,#f59e0b);
  margin:7px 0 8px;
}
.hdr-motto {
  font-size:12px; color:rgba(255,255,255,.85);
  font-style:italic; font-weight:500; letter-spacing:.4px;
}
.hdr-contacts {
  display:flex; flex-direction:column; gap:8px;
  align-items:flex-start; flex-shrink:0;
}
.hdr-contact { display:flex; align-items:center; gap:9px; }
.hdr-icon {
  width:28px; height:28px; border-radius:50%;
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.3);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.hdr-icon svg { width:13px; height:13px; fill:#fde68a; }
.hdr-contact-text { display:flex; flex-direction:column; }
.hdr-contact-text span { font-size:11.5px; color:#fff; font-weight:600; line-height:1.3; }
.hdr-contact-text small { font-size:9.5px; color:rgba(255,255,255,.55); font-weight:400; }


/* ── DATE BAR ── */
.date-bar {
  background:#fff; border-bottom:1px solid #e2e8f0;
  padding:9px 32px;
  display:flex; align-items:center; justify-content:space-between;
}
.date-badge {
  font-size:13px; font-weight:600; color:#0f172a;
  letter-spacing:.2px;
}
.notice-tag {
  background:#fff; border:1.5px solid #2563eb;
  color:#1d4ed8; border-radius:20px;
  padding:4px 16px; font-size:11px; font-weight:800;
  letter-spacing:1.5px; text-transform:uppercase;
}

/* ── BODY ── */
.card-body { padding:28px 36px 24px; background:#fff; }
#msgTitle {
  font-size:21px; font-weight:800; color:#0f172a;
  border:none; outline:none; width:100%;
  background:transparent; font-family:inherit;
  border-bottom:2px solid #e2e8f0; padding-bottom:9px;
  margin-bottom:16px; transition:border-color .2s;
}
#msgTitle:focus { border-bottom-color:#2563eb; }
#msgBody {
  width:100%; min-height:165px;
  border:1.5px solid #e2e8f0; border-radius:10px;
  padding:16px 18px; font-family:inherit;
  font-size:15px; line-height:1.8; color:#1e293b;
  resize:vertical; outline:none;
  transition:border-color .2s, box-shadow .2s;
  background:#fafcff;
}
#msgBody:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.divider {
  height:1px;
  background:linear-gradient(90deg,transparent,#bfdbfe 30%,#bfdbfe 70%,transparent);
  margin:22px 0;
}

/* ── FOOTER ── */
.card-footer {
  display:flex;
  align-items:stretch;
  height:88px;
  background:#fff;
  overflow:hidden;
}
.footer-logo-side {
  display:flex; align-items:center; justify-content:center;
  padding:10px 18px 10px 22px;
  flex-shrink:0;
  background:#fff;
  z-index:2;
}
.footer-logo-side img {
  width:50px; height:50px;
  border-radius:50%;
  object-fit:contain;
}
.footer-curve-side {
  flex:1;
  position:relative;
  overflow:hidden;
}
.footer-curve-side svg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}
.footer-qr {
  position:absolute;
  right:22px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  z-index:3;
}
.footer-qr img {
  width:58px;
  height:58px;
  border-radius:6px;
  border:2px solid rgba(255,255,255,.9);
  background:#fff;
  display:block;
}
.footer-qr span {
  font-size:8.5px;
  font-weight:700;
  color:#fff;
  letter-spacing:.4px;
  text-align:center;
  text-shadow:0 1px 3px rgba(0,0,0,.4);
  white-space:nowrap;
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-group">
    <label>Title Color</label>
    <input type="color" id="ctrlTitleColor" value="#0f172a" oninput="applyStyles()">
  </div>
  <div class="toolbar-group">
    <label>Body Color</label>
    <input type="color" id="ctrlBodyColor" value="#1e293b" oninput="applyStyles()">
  </div>
  <div class="toolbar-group">
    <label>Body Size</label>
    <input type="range" id="ctrlBodySize" min="12" max="22" value="15" oninput="applyStyles()">
  </div>
  <div class="toolbar-group">
    <label>Font</label>
    <select id="ctrlFont" onchange="applyStyles()">
      <option value="'Segoe UI',Arial,sans-serif">Segoe UI</option>
      <option value="Georgia,serif">Georgia</option>
      <option value="'Times New Roman',serif">Times New Roman</option>
      <option value="Verdana,sans-serif">Verdana</option>
      <option value="Tahoma,sans-serif">Tahoma</option>
    </select>
  </div>
  <div class="toolbar-group">
    <label>Date Type</label>
    <select id="ctrlDateType" onchange="updateDateType()">
      <option value="Date">Date</option>
      <option value="ቀን">ቀን</option>
    </select>
  </div>
  <div class="toolbar-group">
    <label>Value</label>
    <input type="text" id="ctrlDate" style="width:136px" oninput="updateDate()">
  </div>
  <div class="toolbar-group">
    <label>Tag</label>
    <input type="text" id="ctrlTag" value="NOTICE" style="width:90px" oninput="updateTag()">
  </div>
  <button class="btn-download" onclick="downloadImage()">⬇ Download Image</button>
</div>

<!-- CARD -->
<div id="card">

  <!-- HEADER -->
  <div class="card-header">
    <div class="hdr-orb1"></div>
    <div class="hdr-orb2"></div>
    <div class="hdr-dots"></div>
    <div class="hdr-inner">
      <div class="hdr-logo-wrap">
        <div class="hdr-logo-ring">
          <img src="logo.png" alt="Bluelight Academy"
               onerror="this.style.display='none';this.parentElement.innerHTML='<span style=\'color:#fde68a;font-size:28px;font-weight:900\'>B</span>'">
        </div>
      </div>
      <div class="hdr-brand">
        <div class="hdr-school-name">Bluelight <em>Academy</em></div>
        <div class="hdr-divider-line"></div>
        <div class="hdr-motto">"Be the light, Lead the way!"</div>
      </div>
      <div class="hdr-contacts">
        <div class="hdr-contact">
          <div class="hdr-icon">
            <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.58.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.29 21 3 13.71 3 4.5c0-.55.45-1 1-1H7.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.23 1.01L6.6 10.8z"/></svg>
          </div>
          <div class="hdr-contact-text">
            <span>+251945409940</span>
            <small>Phone</small>
          </div>
        </div>
        <div class="hdr-contact">
          <div class="hdr-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
          </div>
          <div class="hdr-contact-text">
            <span>bluelight.edu.et</span>
            <small>Website</small>
          </div>
        </div>
        <div class="hdr-contact">
          <div class="hdr-icon">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </div>
          <div class="hdr-contact-text">
            <span>contact@bluelight.edu.et</span>
            <small>Email</small>
          </div>
        </div>
      </div>
    </div>
  </div>
  <svg viewBox="0 0 720 28" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="display:block;width:100%;height:28px;margin-top:-1px;">
    <path d="M0,0 C120,28 240,0 360,18 C480,36 600,8 720,22 L720,28 L0,28 Z" fill="#fff"/>
  </svg>

  <!-- DATE BAR -->
  <div class="date-bar">
    <div class="date-badge" id="dateDisplay"></div>
    <div class="notice-tag" id="tagDisplay">NOTICE</div>
  </div>

  <!-- BODY -->
  <div class="card-body">
    <input id="msgTitle" type="text" placeholder="Message Title / Subject…" value="Important School Announcement"/>
    <textarea id="msgBody" placeholder="Type your message here…">Dear Parents and Students,

We would like to inform you that…

Please ensure all students are present on time. For any inquiries, feel free to contact us through the details above.

Thank you for your continued support.</textarea>
    <div class="divider"></div>
  </div>

  <!-- FOOTER -->
  <div class="card-footer">
    <div class="footer-logo-side">
      <img src="log.png" alt="Logo"
           onerror="this.style.display='none';this.parentElement.innerHTML='<span style=\'color:#1d4ed8;font-size:22px;font-weight:900\'>B</span>'">
      <span style="margin-left:12px;font-size:12px;font-style:italic;font-weight:600;color:#1e40af;white-space:nowrap;">"Be the light, Lead the way!"</span>
    </div>
    <div class="footer-curve-side">
      <svg viewBox="0 0 600 88" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0,88 L0,44 Q60,0 150,24 Q260,54 380,20 Q480,0 600,34 L600,88 Z"
              fill="#1e40af"/>
        <path d="M0,88 L0,64 Q80,24 200,46 Q320,68 440,36 Q520,17 600,51 L600,88 Z"
              fill="#3b82f6" opacity="0.7"/>
      </svg>
      <div class="footer-qr">
        <img src="qrcode.png" alt="QR Code"
             onerror="this.style.display='none'">
        <span>Scan to visit website</span>
      </div>
    </div>
  </div>

</div><!-- end #card -->

<script>
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('ctrlDate').value = dateStr;
  document.getElementById('dateDisplay').textContent = 'Date: ' + dateStr;

  function updateDateType(){
    updateDate();
  }
  function updateDate(){
    const type = document.getElementById('ctrlDateType').value;
    const val  = document.getElementById('ctrlDate').value;
    document.getElementById('dateDisplay').textContent = type + ': ' + val;
  }
  function updateTag(){ document.getElementById('tagDisplay').textContent = document.getElementById('ctrlTag').value; }

  function applyStyles(){
    const tc = document.getElementById('ctrlTitleColor').value;
    const bc = document.getElementById('ctrlBodyColor').value;
    const bs = document.getElementById('ctrlBodySize').value;
    const f  = document.getElementById('ctrlFont').value;
    document.getElementById('msgTitle').style.cssText += `;color:${tc};font-family:${f}`;
    document.getElementById('msgBody').style.cssText  += `;color:${bc};font-size:${bs}px;font-family:${f}`;
  }

  function downloadImage(){
    const card  = document.getElementById('card');
    const title = document.getElementById('msgTitle');
    const body  = document.getElementById('msgBody');
    const tv = title.value, bv = body.value;

    const td = document.createElement('div');
    td.style.cssText = `font-size:21px;font-weight:800;color:${title.style.color||'#0f172a'};font-family:${title.style.fontFamily||'inherit'};padding-bottom:9px;margin-bottom:16px;width:100%;`;
    td.textContent = tv;

    const bd = document.createElement('div');
    bd.style.cssText = `width:100%;min-height:165px;padding:16px 18px;font-size:${body.style.fontSize||'15px'};line-height:1.8;color:${body.style.color||'#1e293b'};font-family:${body.style.fontFamily||'inherit'};background:#fafcff;white-space:pre-wrap;word-break:break-word;`;
    bd.textContent = bv;

    title.style.display='none'; body.style.display='none';
    title.parentElement.insertBefore(td, title);
    body.parentElement.insertBefore(bd, body);

    // hide all lines
    const datebar = document.querySelector('.date-bar');
    const divider = document.querySelector('.divider');
    datebar.style.borderBottom = 'none';
    divider.style.background = 'transparent';

    // remove border-radius so no white corners
    const origRadius = card.style.borderRadius;
    const origShadow = card.style.boxShadow;
    card.style.borderRadius = '0';
    card.style.boxShadow = 'none';

    html2canvas(card,{
      scale:2,
      useCORS:true,
      allowTaint:true,
      backgroundColor:null,
      logging:false,
      x:0, y:0,
      scrollX:0, scrollY:0,
      width:card.offsetWidth,
      height:card.offsetHeight
    }).then(canvas=>{
      title.style.display=''; body.style.display='';
      td.remove(); bd.remove();
      datebar.style.borderBottom = '';
      divider.style.background   = '';
      card.style.borderRadius = origRadius;
      card.style.boxShadow    = origShadow;

      // apply rounded corners to final image
      const radius = 44; // 22px * scale:2
      const w = canvas.width, h = canvas.height;
      const rounded = document.createElement('canvas');
      rounded.width = w; rounded.height = h;
      const ctx = rounded.getContext('2d');
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(w - radius, 0);
      ctx.quadraticCurveTo(w, 0, w, radius);
      ctx.lineTo(w, h - radius);
      ctx.quadraticCurveTo(w, h, w - radius, h);
      ctx.lineTo(radius, h);
      ctx.quadraticCurveTo(0, h, 0, h - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(canvas, 0, 0);

      const a = document.createElement('a');
      a.download = `Bluelight_${document.getElementById('ctrlTag').value||'Notice'}_${document.getElementById('ctrlDate').value.replace(/\s/g,'_')}.png`;
      a.href = rounded.toDataURL('image/png');
      a.click();
    }).catch(()=>{
      title.style.display=''; body.style.display='';
      td.remove(); bd.remove();
      datebar.style.borderBottom = '';
      divider.style.background   = '';
      card.style.borderRadius = origRadius;
      card.style.boxShadow    = origShadow;
      alert('Download failed. Make sure the file is opened in a browser.');
    });
  }
</script>
</body>
</html>
